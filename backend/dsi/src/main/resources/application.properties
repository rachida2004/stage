spring.application.name=dsi
# ── Serveur ──────────────────────────────────────────────────────
server.port=8085

# ── PostgreSQL ────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/gestion
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────────
jwt.secret=dsiConnectSecretKey2024BurkinaFasoMinistere
jwt.expiration=86400000

# ── Upload fichiers ───────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
upload.dir=./uploads
# Désactiver open-in-view (évite des erreurs de session Hibernate)
spring.jpa.open-in-view=true



# ── Mail ──────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@dsi.gov.bf
spring.mail.password=YOUR_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# ── Logs ─────────────────────────────────────────────────────────
logging.level.com.bf.dsi=DEBUG
logging.level.org.springframework.security=WARN